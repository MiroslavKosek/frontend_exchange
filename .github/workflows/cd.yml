name: CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: |
          npm run build -- --base-href /frontend_exchange/
          cp dist/frontend-exchange/browser/index.html dist/frontend-exchange/browser/404.html

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: dist/frontend-exchange/browser/
  
  deploy:
      name: Deploy to GitHub Pages
      runs-on: ubuntu-latest
      needs: build
      permissions:
        contents: write
      steps:
        - name: Checkout
          uses: actions/checkout@v6

        - name: Download build artifacts
          uses: actions/download-artifact@v7
          with:
            name: frontend-build
            path: dist/

        - name: Deploy to GitHub Pages
          uses: peaceiris/actions-gh-pages@v4
          with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            publish_dir: ./dist
            publish_branch: gh-pages
            force_orphan: true
