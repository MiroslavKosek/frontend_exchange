name: CI Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: |
          npm run build -- --base-href /frontend_exchange/
          cp dist/frontend-exchange/browser/index.html dist/frontend-exchange/browser/404.html

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: dist/frontend-exchange/browser/

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
  
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest with Coverage
        run: npx ng test --watch=false --coverage

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v7
        if: always() 
        with:
          name: frontend-coverage-report
          path: coverage/

      - name: Vitest coverage comment
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          threshold-icons: "{0: '🔴', 50: '🟠', 80: '🟢'}"
          github-token: ${{ secrets.GITHUB_TOKEN }}
