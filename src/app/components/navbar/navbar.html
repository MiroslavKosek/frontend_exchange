<p-menubar [model]="items" class="w-full">
    <ng-template #start>
        <div class="flex items-center gap-2 pr-4">
            <i class="pi pi-chart-line text-primary text-2xl"></i>
            <span class="font-bold text-xl text-primary">{{ 'Exchange App' | translate }}</span>
        </div>
    </ng-template>
    <ng-template #end>
        <div class="flex items-center gap-2">
            <p-button [label]="username()" 
                icon="pi pi-user" 
                variant="text" 
                (onClick)="userMenu.toggle($event)" />
            <p-tieredmenu #userMenu [model]="userMenuItems" [popup]="true" />
        </div>
    </ng-template>
</p-menubar>
